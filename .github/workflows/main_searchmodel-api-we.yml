# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - searchmodel-api-we

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://searchmodel.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_09f1704236c346cca6caa3cbcecf213c }}
        password: ${{ secrets.AzureAppService_ContainerPassword_e6d46cb832a842f9a973affc08fe15d7 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        context: ./harmocaremodels/search_model
        file: ./harmocaremodels/search_model/Dockerfile
        push: true
        tags: searchmodel.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_09f1704236c346cca6caa3cbcecf213c }}/mlapi:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'searchmodel-api-we'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_1d50b0eb701045a3a378f72f14be52c7 }}
        images: 'searchmodel.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_09f1704236c346cca6caa3cbcecf213c }}/mlapi:${{ github.sha }}'
